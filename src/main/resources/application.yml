spring:
  application:
    name: bloated-shelf
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
  flyway:
    enabled: true

app:
  seed:
    authors: 30
    books: 200
    members: 50
    reviews-per-book: 5
    loans-per-member: 8
